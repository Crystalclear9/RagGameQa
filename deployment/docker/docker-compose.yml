# docker-compose.yml
version: '3.8'

services:
  rag-api:
    build: .
    ports:
      - "8000:8000"
    environment:
      - DEBUG=False
      - DATABASE_URL=postgresql://user:password@postgres:5432/rag_game_qa
      - REDIS_URL=redis://redis:6379
    depends_on:
      - postgres
      - redis
      - qdrant
    volumes:
      - ./logs:/app/logs
      - ./data:/app/data

  postgres:
    image: postgres:13
    environment:
      - POSTGRES_DB=rag_game_qa
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis:6-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

volumes:
  postgres_data:
  redis_data:
  qdrant_data:
