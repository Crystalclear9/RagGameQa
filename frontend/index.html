<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>GameQA Assistant</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/assets/styles.css?v=75">
</head>
<body>
  <div class="app-layout">
    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="sidebar-header">
        <div class="brand-title-wrap" style="display: flex; align-items: center; gap: 0.8rem;">
          <div class="brand-logo" style="width: 32px; height: 32px; position: relative;">
            <canvas id="particleLogo" width="32" height="32" style="position: absolute; top:0; left:0; width: 100%; height: 100%;"></canvas>
          </div>
          <h1 class="brand-title">GameQA</h1>
        </div>
        <button id="newChatBtn" class="new-chat-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
          新对话
        </button>
      </div>
      
      <div class="sidebar-section domains-section">
        <h3 class="section-title collapse-trigger" id="gameDomainsTrigger" style="cursor:pointer; display:flex; justify-content:space-between; align-items:center;">
          <span>选择游戏领域</span>
          <svg class="chevron" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="transition: transform 0.3s;"><polyline points="6 9 12 15 18 9"></polyline></svg>
        </h3>
        <div class="game-pills game-pills-collapse" id="gameDomainsContent">
          <button class="game-pill active" data-game="wow">魔兽世界</button>
          <button class="game-pill" data-game="lol">英雄联盟</button>
          <button class="game-pill" data-game="genshin">原神</button>
          <button class="game-pill" data-game="minecraft">我的世界</button>
          <div class="custom-domain-box" style="display:flex; margin-top:0.4rem; gap:0.4rem; width:100%;">
            <input type="text" id="customDomainInput" placeholder="自定义游戏名" style="flex:1; border:1px solid #cbd5e1; border-radius:0.375rem; padding:0.25rem 0.5rem; font-size:0.875rem;">
            <button id="addDomainBtn" style="background:var(--brand-color); color:white; border:none; border-radius:0.375rem; padding:0 0.5rem; font-size:1rem; cursor:pointer;" title="添加自定义领域">+</button>
          </div>
        </div>
        <input type="hidden" id="gameId" value="wow">
      </div>

      <div class="sidebar-section stretch">
        <h3 class="section-title">最近提问</h3>
        <div id="historyList" class="history-list">
          <!-- History items injected here -->
        </div>
      </div>
    </aside>

    <!-- Main Chat Area -->
    <main class="chat-main">
      <div id="chatContainer" class="chat-container">
        <div class="message system-message">
          <div class="avatar system-avatar" title="GameQA Agent"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 10a8 8 0 0 1 16 0v5"></path><rect x="2" y="10" width="4" height="7" rx="1.5"></rect><rect x="18" y="10" width="4" height="7" rx="1.5"></rect><rect x="7" y="9" width="10" height="6" rx="2" fill="currentColor" fill-opacity="0.15"></rect><circle cx="9.5" cy="12" r="1.5" fill="currentColor"></circle><circle cx="14.5" cy="12" r="1.5" fill="currentColor"></circle><path d="M20 15v2c0 1-1 1.5-1 1.5l-2.5 .5"></path></svg></div>
          <div class="bubble">您好！我是您的游戏问答智能体，已为您开启一段全新的对话之旅。</div>
        </div>
      </div>
      
      <div class="input-area-wrapper">
        <form id="chatForm" class="chat-form">
          <!-- The + Menu Button -->
          <div class="plus-menu-container">
            <button type="button" class="plus-btn" id="plusMenuBtn" title="附件与功能">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            </button>
            <div class="plugins-menu" id="pluginsMenu">
              <label class="plugin-item">
                <input type="checkbox" id="enableWebRetrieval" checked>
                <div class="plugin-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"></circle><line x1="2" y1="12" x2="22" y2="12"></line><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"></path></svg></div>
                <div class="plugin-text">
                  <span class="plugin-title">联网搜索</span>
                  <span class="plugin-desc">允许利用网络查询缺失的资料</span>
                </div>
              </label>
              <label class="plugin-item">
                <input type="checkbox" id="assistiveGuide">
                <div class="plugin-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg></div>
                <div class="plugin-text">
                  <span class="plugin-title">分步辅助</span>
                  <span class="plugin-desc">生成更详细的操作向导</span>
                </div>
              </label>
              <label class="plugin-item">
                <input type="checkbox" id="familyMode">
                <div class="plugin-icon"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg></div>
                <div class="plugin-text">
                  <span class="plugin-title">长辈模式</span>
                  <span class="plugin-desc">精简易懂的解答口吻</span>
                </div>
              </label>
            </div>
          </div>
          
          <textarea id="questionInput" class="chat-input" placeholder="输入你想了解的游戏资料..." rows="1"></textarea>
          
          <div class="toolbar-right">
            <button type="button" class="voice-btn" id="voiceBtn" title="语音识别">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 1a3 3 0 0 0-3 3v8a3 3 0 0 0 6 0V4a3 3 0 0 0-3-3z"></path><path d="M19 10v2a7 7 0 0 1-14 0v-2"></path><line x1="12" y1="19" x2="12" y2="23"></line><line x1="8" y1="23" x2="16" y2="23"></line></svg>
            </button>
            <button type="submit" class="send-btn" disabled>
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
          </div>
        </form>
        <div class="trust-badge">
          <span id="confidenceLabel">实时基于知识库与多模态分析</span>
        </div>
      </div>
    </main>
  </div>
  <script src="/assets/app.js?v=75"></script>
</body>
</html>
